<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Screen - Tiamat Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --dark: #0f0f0f; --panel: #1a1a1a;
            --text: #f5f1e8; --accent: #5e2f11; --danger: #ff4d4d;
        }
        body { font-family: 'Crimson Text', serif; background: var(--dark); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        /* Menu e Tabs */
        .dm-header { background: #2c1a10; padding: 10px; border-bottom: 3px solid var(--gold); display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 100; }
        .nav-tabs { display: flex; overflow-x: auto; background: #111; border-bottom: 1px solid var(--gold); }
        .tab-btn { background: none; border: none; color: var(--gold); padding: 15px 20px; cursor: pointer; font-family: 'Cinzel'; font-size: 0.85rem; white-space: nowrap; }
        .tab-btn.active { background: var(--gold); color: black; }
        
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Cards e Listas */
        .card { background: var(--panel); border: 1px solid #444; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        h3 { color: var(--gold); font-family: 'Cinzel'; margin-top: 0; border-bottom: 1px solid var(--accent); }
        
        .file-item { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; border-radius: 5px; margin-bottom: 5px; border: 1px solid #333; }
        
        /* Inputs */
        input, select, textarea { background: #000; color: white; border: 1px solid var(--gold); padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 4px; font-family: 'Cinzel'; cursor: pointer; font-weight: bold; }
        .btn-sm { padding: 5px 10px; font-size: 0.7rem; }
        .dm-only { border: 2px dashed var(--danger) !important; padding: 10px; }

        /* Scorecard */
        .score-table { width: 100%; border-collapse: collapse; background: #111; font-size: 0.9rem; margin-top: 10px; }
        .score-table th, .score-table td { border: 1px solid #333; padding: 8px; text-align: center; }
        .score-table th { background: var(--accent); color: var(--gold); }
    </style>
</head>
<body>

<div class="dm-header">
    <label><input type="checkbox" id="dm-mode" onchange="refreshView()" checked style="width:auto"> 👑 MESTRE</label>
    <button class="btn" onclick="exportData()">💾 EXPORTAR TUDO (JSON)</button>
    <label class="btn" style="background:transparent; border:1px solid var(--gold); color:var(--gold)">
        📂 IMPORTAR <input type="file" style="display:none" onchange="importData(event)">
    </label>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="openTab(event, 'tab-mapa')">📍 Mapa</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-files')">📁 Arquivos/PDFs</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-council')">🏛️ Conselho</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-npcs')">👥 NPCs</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-loot')">🎲 Loot</button>
</div>

<div class="container">
    
    <div id="tab-mapa" class="tab-content active">
        <div class="dm-only card">Mapa Principal: <input type="file" onchange="uploadMap(event)"></div>
        <div style="overflow: auto; border: 2px solid var(--gold); border-radius: 10px; background: #000;">
            <img id="map-img" src="" style="width: 100%; min-width: 1000px; display: block;">
        </div>
    </div>

    <div id="tab-files" class="tab-content">
        <h3>Repositório de Documentos (PDF, Docx, etc.)</h3>
        <div class="dm-only card">
            <p>Adicionar Relatório de Sessão ou Documento:</p>
            <input type="file" id="file-upload" onchange="handleFileUpload(event)">
            <p><small>*Arquivos muito grandes podem deixar o carregamento lento. Tente PDFs leves.</small></p>
        </div>
        
        <div id="file-list" style="margin-top: 20px;">
            </div>
    </div>

    <div id="tab-council" class="tab-content">
        <h3>Council Scorecard</h3>
        <table class="score-table">
            <thead>
                <tr>
                    <th>Evento</th>
                    <th>Harp</th><th>Gaunt</th><th>Encl</th><th>Lord</th><th>Zhent</th>
                    <th>X</th>
                </tr>
            </thead>
            <tbody id="council-body"></tbody>
            <tfoot>
                <tr style="color:var(--gold); font-weight:bold;">
                    <td>TOTAL</td>
                    <td id="t-h">0</td><td id="t-m">0</td><td id="t-e">0</td><td id="t-a">0</td><td id="t-z">0</td>
                    <td>-</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div id="tab-npcs" class="tab-content">
        <div id="npc-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:15px;"></div>
        <div class="dm-only card" style="margin-top:20px">
            <h3>Novo NPC</h3>
            <input type="text" id="npc-n" placeholder="Nome">
            <textarea id="npc-d" placeholder="Descrição"></textarea>
            <button class="btn" onclick="addNPC()">Salvar</button>
        </div>
    </div>

    <div id="tab-loot" class="tab-content">
        <div class="card">
            <h3>Gerador de Tesouro</h3>
            <button class="btn" onclick="document.getElementById('res-l').innerText = 'Tesouro: ' + (Math.floor(Math.random()*100)+20) + ' PO e Poção de Cura';">Gerar!</button>
            <div id="res-l" style="margin-top:10px; font-weight:bold"></div>
        </div>
    </div>

</div>

<script>
    let state = {
        map: "",
        council: {},
        npcs: [],
        files: [] // {name: "", type: "", data: ""}
    };

    const COUNCIL_DATA = [
        { id: 'skyreach', label: 'Castelo Skyreach', h:1, m:1, e:1, a:1, z:1 },
        { id: 'hatchery', label: 'Viveiro Destruído', h:0, m:1, e:0, a:1, z:0 },
        { id: 'rezmir', label: 'Rezmir Morta', h:0, m:1, e:1, a:1, z:0 }
    ];

    function save() { localStorage.setItem('tiamat_v4', JSON.stringify(state)); }

    function load() {
        const d = localStorage.getItem('tiamat_v4');
        if(d) state = JSON.parse(d);
        if(state.map) document.getElementById('map-img').src = state.map;
        refreshView();
    }

    // --- UPLOAD DE ARQUIVOS ---
    function handleFileUpload(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            state.files.push({
                name: file.name,
                type: file.type,
                data: evt.target.result // Base64 do arquivo
            });
            save();
            renderFiles();
        };
        reader.readAsDataURL(file);
    }

    function renderFiles() {
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        state.files.forEach((f, i) => {
            list.innerHTML += `
                <div class="file-item">
                    <span>📄 ${f.name}</span>
                    <div>
                        <button class="btn btn-sm" onclick="downloadFile(${i})">Abrir/Baixar</button>
                        <button class="btn btn-sm btn-danger" onclick="state.files.splice(${i},1);save();renderFiles()">Apagar</button>
                    </div>
                </div>
            `;
        });
    }

    function downloadFile(i) {
        const f = state.files[i];
        const link = document.createElement('a');
        link.href = f.data;
        link.download = f.name;
        link.click();
    }

    // --- LOGICA GERAL ---
    function openTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function renderCouncil() {
        const b = document.getElementById('council-body');
        b.innerHTML = '';
        let t = {h:0, m:0, e:0, a:0, z:0};
        COUNCIL_DATA.forEach(ev => {
            const active = state.council[ev.id];
            if(active) { t.h+=ev.h; t.m+=ev.m; t.e+=ev.e; t.a+=ev.a; t.z+=ev.z; }
            b.innerHTML += `<tr><td>${ev.label}</td><td>${ev.h}</td><td>${ev.m}</td><td>${ev.e}</td><td>${ev.a}</td><td>${ev.z}</td>
                <td><input type="checkbox" style="width:auto" ${active?'checked':''} onchange="state.council['${ev.id}']=!state.council['${ev.id}'];save();renderCouncil()"></td></tr>`;
        });
        document.getElementById('t-h').innerText = t.h;
        document.getElementById('t-m').innerText = t.m;
        document.getElementById('t-e').innerText = t.e;
        document.getElementById('t-a').innerText = t.a;
        document.getElementById('t-z').innerText = t.z;
    }

    function uploadMap(e) {
        const r = new FileReader();
        r.onload = (ev) => { state.map = ev.target.result; document.getElementById('map-img').src = state.map; save(); };
        r.readAsDataURL(e.target.files[0]);
    }

    function addNPC() {
        const n = document.getElementById('npc-n').value;
        const d = document.getElementById('npc-d').value;
        if(n) { state.npcs.push({n, d}); save(); refreshView(); }
    }

    function refreshView() {
        renderFiles();
        renderCouncil();
        const grid = document.getElementById('npc-grid');
        grid.innerHTML = '';
        state.npcs.forEach((npc, i) => {
            grid.innerHTML += `<div class="card"><h3>${npc.n}</h3><p>${npc.d}</p><button class="btn btn-sm btn-danger" onclick="state.npcs.splice(${i},1);save();refreshView()">Remover</button></div>`;
        });
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
        a.download = "tiamat_master_v4.json";
        a.click();
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (ev) => { state = JSON.parse(ev.target.result); save(); location.reload(); };
        r.readAsText(e.target.files[0]);
    }

    load();
</script>
</body>
</html>
