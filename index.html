<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Dashboard - Tiamat Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --dark: #121212; --panel: #1e1e1e;
            --text: #f5f1e8; --accent: #8b4513; --danger: #e74c3c; --safe: #27ae60;
        }
        body { font-family: 'Crimson Text', serif; background: var(--dark); color: var(--text); margin: 0; padding-bottom: 50px; -webkit-tap-highlight-color: transparent; }
        
        /* BARRA DE FERRAMENTAS DM (Sticky para facilitar no Mobile) */
        .dm-toolbar { 
            background: #2c1a10; padding: 12px; border-bottom: 2px solid var(--gold);
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px black;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
        header { text-align: center; margin-bottom: 15px; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0; font-size: 1.8rem; }

        /* ABAS (Scroll lateral no Mobile) */
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { 
            background: var(--panel); border: 1px solid var(--gold); border-bottom: none;
            color: var(--gold); padding: 12px 20px; cursor: pointer; font-family: 'Cinzel';
            border-radius: 8px 8px 0 0; white-space: nowrap; font-size: 0.9rem;
        }
        .tab-btn.active { background: var(--gold); color: var(--dark); font-weight: bold; }
        .tab-content { display: none; background: var(--panel); padding: 20px; border-radius: 0 0 8px 8px; border: 1px solid #333; min-height: 400px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MAPA INTERATIVO */
        #map-container { position: relative; border: 2px solid var(--gold); background: #000; overflow: auto; max-height: 75vh; border-radius: 8px; cursor: crosshair; }
        #map-img { width: 100%; display: block; min-width: 800px; } /* Garante que o mapa não fique minúsculo */
        .pin { 
            position: absolute; width: 22px; height: 22px; background: var(--gold); 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 5;
        }
        .pin::after { 
            content: attr(data-label); position: absolute; top: -35px; left: 50%; 
            transform: translateX(-50%); background: black; padding: 4px 10px;
            border-radius: 4px; border: 1px solid var(--gold); font-size: 0.85rem; 
            white-space: nowrap; color: white; opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .pin:hover::after { opacity: 1; }

        /* FACÇÕES */
        .faction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .faction-card { background: rgba(0,0,0,0.5); padding: 15px; border: 1px solid var(--accent); border-radius: 8px; text-align: center; }
        .score-val { font-family: 'Cinzel'; font-size: 2.5rem; display: block; margin: 5px 0; }
        .neg { color: var(--danger); text-shadow: 0 0 10px rgba(231,76,60,0.4); }
        .pos { color: var(--safe); text-shadow: 0 0 10px rgba(39,174,96,0.4); }

        /* CARDS DE NPC E NOTAS */
        .card { background: #1a1a1a; padding: 15px; border: 1px solid #444; border-radius: 8px; margin-bottom: 15px; position: relative; }
        .secret-card { border-color: var(--danger) !important; background: rgba(231, 76, 60, 0.05); }
        .secret-badge { color: var(--danger); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        textarea { width: 100%; background: #000; color: #eee; border: 1px solid #333; padding: 12px; border-radius: 5px; min-height: 100px; font-family: inherit; font-size: 1rem; }
        input[type="text"], input[type="number"] { background: #000; color: white; border: 1px solid var(--gold); padding: 8px; border-radius: 4px; font-family: inherit; }

        /* UTILITÁRIOS */
        .btn { background: var(--gold); color: var(--dark); border: none; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-sec { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.7rem; margin-top: 10px; }
        .player-hidden { display: none !important; }
        .dm-only-ui { background: rgba(212,175,55,0.08); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--gold); }

    </style>
</head>
<body>

<div class="dm-toolbar">
    <label style="color: var(--gold); font-weight: bold; cursor: pointer;">
        <input type="checkbox" id="dm-toggle" onchange="refreshUI()" checked> 👑 MODO MESTRE
    </label>
    <button class="btn" style="font-size: 0.7rem;" onclick="exportData()">📤 EXPORTAR (PC)</button>
    <label class="btn btn-sec" style="font-size: 0.7rem;">
        📥 IMPORTAR (iPhone)
        <input type="file" id="import-file" style="display:none" onchange="importData(event)">
    </label>
</div>

<div class="container">
    <header>
        <h1>CONSELHO DE WATERDEEP</h1>
        <p id="view-mode-text" style="font-size: 0.8rem; color: var(--gold);">Visão: Mestre</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-mapa')">📍 Mapa</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-faccoes')">⚔️ Alianças</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-npcs')">👤 NPCs</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-notas')">📝 Notas</button>
    </div>

    <div id="tab-mapa" class="tab-content active">
        <div class="dm-only-ui dm-only">
            <label>Carregar Mapa (Imagem): <input type="file" onchange="uploadMap(event)"></label>
            <p><small>Com Modo Mestre ativo, toque no mapa para fixar um ponto.</small></p>
        </div>
        <div id="map-container" onclick="handleMapClick(event)">
            <img id="map-img" src="" alt="Faça upload do mapa para começar.">
        </div>
    </div>

    <div id="tab-faccoes" class="tab-content">
        <div class="faction-grid" id="factions-container"></div>
    </div>

    <div id="tab-npcs" class="tab-content">
        <div class="dm-only-ui dm-only">
            <strong>Adicionar Personagem</strong><br><br>
            <input type="text" id="npc-name" placeholder="Nome do NPC" style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="npc-role" placeholder="Facção/Cargo" style="width: 100%; margin-bottom: 10px;">
            <label><input type="checkbox" id="npc-secret"> Tornar Secreto? (Só Mestre vê)</label><br><br>
            <button class="btn" onclick="addNPC()">+ Adicionar ao Conselho</button>
        </div>
        <div id="npc-list"></div>
    </div>

    <div id="tab-notas" class="tab-content">
        <div class="dm-only-ui dm-only">
            <button class="btn" onclick="addNote()">+ Nova Pasta de Notas</button>
        </div>
        <div id="notes-list"></div>
    </div>
</div>

<script>
    // ESTADO DO APLICATIVO
    let db = {
        map: "",
        pins: [],
        factions: { "Harpers": 0, "Lords' Alliance": 0, "Emerald Enclave": 0, "Order of Gauntlet": 0, "Zhentarim": 0 },
        npcs: [],
        notes: []
    };

    // --- SISTEMA DE SALVAMENTO E SINCRONIA ---
    function save() {
        localStorage.setItem('tiamat_pro_v1', JSON.stringify(db));
    }

    function exportData() {
        const data = JSON.stringify(db);
        const blob = new Blob([data], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `tiamat_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                db = JSON.parse(event.target.result);
                if(db.map) document.getElementById('map-img').src = db.map;
                save();
                refreshUI();
                alert("Backup importado com sucesso!");
            } catch(err) {
                alert("Erro ao importar arquivo.");
            }
        };
        reader.readAsText(e.target.files[0]);
    }

    // --- MAPA ---
    function uploadMap(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db.map = ev.target.result;
            document.getElementById('map-img').src = db.map;
            save();
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function handleMapClick(e) {
        if(!document.getElementById('dm-toggle').checked) return;
        const img = document.getElementById('map-img');
        const rect = img.getBoundingClientRect();
        
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        
        const label = prompt("O que há neste local?");
        if(label) {
            db.pins.push({ x, y, label, secret: confirm("Este marcador é secreto?") });
            save();
            renderPins();
        }
    }

    function renderPins() {
        const isDM = document.getElementById('dm-toggle').checked;
        const container = document.getElementById('map-container');
        container.querySelectorAll('.pin').forEach(p => p.remove());
        
        db.pins.forEach((p, i) => {
            if(!isDM && p.secret) return;
            const div = document.createElement('div');
            div.className = 'pin';
            div.style.left = p.x + '%';
            div.style.top = p.y + '%';
            div.setAttribute('data-label', p.label + (p.secret ? ' (SECRET)' : ''));
            if(isDM) {
                div.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm("Remover este marcador?")) { db.pins.splice(i, 1); save(); renderPins(); }
                };
            }
            container.appendChild(div);
        });
    }

    // --- NPCs E NOTAS ---
    function addNPC() {
        const name = document.getElementById('npc-name').value;
        const role = document.getElementById('npc-role').value;
        const secret = document.getElementById('npc-secret').checked;
        if(name) {
            db.npcs.push({ name, role, secret });
            document.getElementById('npc-name').value = '';
            document.getElementById('npc-role').value = '';
            save(); refreshUI();
        }
    }

    function addNote() {
        const title = prompt("Título da Pasta (Ex: Rumores, Loot):");
        if(title) {
            db.notes.push({ title, content: "", secret: confirm("Esta pasta é secreta?") });
            save(); refreshUI();
        }
    }

    // --- RENDERIZAÇÃO GERAL ---
    function refreshUI() {
        const isDM = document.getElementById('dm-toggle').checked;
        
        // Texto de Visão
        document.getElementById('view-mode-text').innerText = `Visão: ${isDM ? 'Mestre (Tudo visível)' : 'Jogador (Segredos ocultos)'}`;
        
        // Esconder/Mostrar Elementos DM
        document.querySelectorAll('.dm-only').forEach(el => el.classList.toggle('player-hidden', !isDM));

        // Renderizar Seções
        renderFactions(isDM);
        renderNPCs(isDM);
        renderNotes(isDM);
        renderPins();
    }

    function renderFactions(isDM) {
        const container = document.getElementById('factions-container');
        container.innerHTML = '';
        for(let f in db.factions) {
            const val = db.factions[f];
            container.innerHTML += `
                <div class="faction-card">
                    <strong>${f}</strong>
                    <span class="score-val ${val < 0 ? 'neg' : 'pos'}">${val}</span>
                    <div class="${isDM ? '' : 'player-hidden'}">
                        <input type="number" value="${val}" onchange="updateFaction('${f}', this.value)">
                    </div>
                </div>`;
        }
    }

    function updateFaction(name, val) {
        db.factions[name] = parseInt(val) || 0;
        save(); renderFactions(true);
    }

    function renderNPCs(isDM) {
        const container = document.getElementById('npc-list');
        container.innerHTML = '';
        db.npcs.forEach((n, i) => {
            if(!isDM && n.secret) return;
            container.innerHTML += `
                <div class="card ${n.secret ? 'secret-card' : ''}">
                    ${n.secret ? '<span class="secret-badge">🔒 Secreto</span>' : ''}
                    <strong style="font-size: 1.2rem; color: var(--gold);">${n.name}</strong><br>
                    <small>${n.role}</small>
                    ${isDM ? `<br><button class="btn-del" onclick="removeNPC(${i})">Remover</button>` : ''}
                </div>`;
        });
    }

    function renderNotes(isDM) {
        const container = document.getElementById('notes-list');
        container.innerHTML = '';
        db.notes.forEach((n, i) => {
            if(!isDM && n.secret) return;
            container.innerHTML += `
                <div class="card ${n.secret ? 'secret-card' : ''}">
                    ${n.secret ? '<span class="secret-badge">🔒 Nota Privada</span>' : ''}
                    <strong>${n.title}</strong>
                    <textarea onchange="updateNote(${i}, this.value)" ${!isDM ? 'readonly' : ''}>${n.content}</textarea>
                    ${isDM ? `<button class="btn-del" onclick="removeNote(${i})">Excluir Pasta</button>` : ''}
                </div>`;
        });
    }

    function updateNote(i, val) { db.notes[i].content = val; save(); }
    function removeNPC(i) { db.npcs.splice(i,1); save(); refreshUI(); }
    function removeNote(i) { if(confirm("Apagar pasta?")) { db.notes.splice(i,1); save(); refreshUI(); } }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    // Inicializar
    const saved = localStorage.getItem('tiamat_pro_v1');
    if(saved) {
        db = JSON.parse(saved);
        if(db.map) document.getElementById('map-img').src = db.map;
    }
    refreshUI();

</script>
</body>
</html>
